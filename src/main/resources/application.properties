spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#HMAC 토큰 서명용 secrect. 연습에서만 properties에 넣는다.
jwt.secret=your-very-long-secret-key-for-authlab-demo-1234567890

#RSA 키 경로. 연습에서만 properties에 넣는다.
jwt.private-key-path=keys/private_key.pem
jwt.public-key-path=keys/public_key.pem

jwt.expiration=3600000

spring.datasource.url=jdbc:postgresql://authlab-db:5432/authlab
spring.datasource.username=authlab
spring.datasource.password=authlab123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true